<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 350" role="img" aria-labelledby="title desc">
  <title id="title">AutoGuard Servicios</title>
  <desc id="desc">Escudo metálico AutoGuard con letra A, aprobación, engranaje y vehículo</desc>
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".16" stop-color="#70767d"/>
      <stop offset=".34" stop-color="#f7f8f9"/>
      <stop offset=".58" stop-color="#757b82"/>
      <stop offset=".82" stop-color="#e9ecef"/>
      <stop offset="1" stop-color="#4c5259"/>
    </linearGradient>
    <linearGradient id="steel-dark" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#f4f5f6"/>
      <stop offset=".42" stop-color="#8a9198"/>
      <stop offset="1" stop-color="#3f454b"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffb04c"/>
      <stop offset=".42" stop-color="#ff7600"/>
      <stop offset="1" stop-color="#d94900"/>
    </linearGradient>
    <radialGradient id="inner" cx="48%" cy="30%" r="78%">
      <stop stop-color="#23282d"/>
      <stop offset=".52" stop-color="#0b0e11"/>
      <stop offset="1" stop-color="#030405"/>
    </radialGradient>
    <filter id="shadow" x="-35%" y="-25%" width="170%" height="185%">
      <feDropShadow dx="0" dy="15" stdDeviation="12" flood-color="#000" flood-opacity=".78"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <path d="M160 8 294 54v104c0 86-49 145-134 178C75 303 26 244 26 158V54Z" fill="url(#steel)"/>
    <path d="M160 22 280 63v94c0 76-41 128-120 159C81 285 40 233 40 157V63Z" fill="#050709"/>
    <path d="M160 34 268 72v86c0 66-36 113-108 142-72-29-108-76-108-142V72Z" fill="url(#inner)" stroke="url(#orange)" stroke-width="5"/>
    <path d="M160 48 255 81" fill="none" stroke="#fff" stroke-opacity=".22" stroke-width="2"/>

    <g transform="translate(160 221)" opacity=".92">
      <g fill="url(#steel-dark)">
        <rect x="-10" y="-72" width="20" height="28" rx="3"/>
        <rect x="-10" y="44" width="20" height="28" rx="3"/>
        <rect x="-10" y="-72" width="20" height="28" rx="3" transform="rotate(45)"/>
        <rect x="-10" y="44" width="20" height="28" rx="3" transform="rotate(45)"/>
        <rect x="-10" y="-72" width="20" height="28" rx="3" transform="rotate(90)"/>
        <rect x="-10" y="44" width="20" height="28" rx="3" transform="rotate(90)"/>
        <rect x="-10" y="-72" width="20" height="28" rx="3" transform="rotate(135)"/>
        <rect x="-10" y="44" width="20" height="28" rx="3" transform="rotate(135)"/>
      </g>
      <circle r="58" fill="url(#steel-dark)"/>
      <circle r="43" fill="#080a0c" stroke="url(#orange)" stroke-width="5"/>
      <circle r="24" fill="#14181c" stroke="#aeb4ba" stroke-width="3"/>
    </g>

    <path d="M89 196 142 65h34l56 131h-38l-12-31h-51l-12 31Zm54-65h27l-14-37Z" fill="url(#steel-dark)" stroke="#f1f3f4" stroke-width="2.5"/>
    <path d="m112 150 29 30 75-91" fill="none" stroke="#050709" stroke-width="21" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="m112 146 29 30 75-91" fill="none" stroke="url(#steel)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

    <g>
      <path d="M62 224c13-19 35-30 67-34l39-4c24-2 43 5 60 21l17 15 23 7c7 2 11 8 11 15v15H47v-18c0-8 6-14 15-17Z" fill="#080a0c" stroke="url(#steel)" stroke-width="4"/>
      <path d="M100 219c16-14 31-20 51-22l28-2c14-1 27 4 39 16l8 8Z" fill="#343a40" stroke="#dce0e3" stroke-width="2"/>
      <path d="M53 242h30" stroke="url(#orange)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
      <path d="M248 235h19" stroke="#ff8a1f" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
      <circle cx="95" cy="257" r="21" fill="#050607" stroke="url(#steel)" stroke-width="5"/>
      <circle cx="95" cy="257" r="8" fill="#5f666d" stroke="#f0f2f3" stroke-width="2"/>
      <circle cx="226" cy="257" r="21" fill="#050607" stroke="url(#steel)" stroke-width="5"/>
      <circle cx="226" cy="257" r="8" fill="#5f666d" stroke="#f0f2f3" stroke-width="2"/>
    </g>

    <path d="M101 299c16 9 35 18 59 27 24-9 43-18 59-27" fill="none" stroke="#ff7600" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
