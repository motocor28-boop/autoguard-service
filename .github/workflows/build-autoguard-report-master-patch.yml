name: Build AUTOGUARD Consolidated Patch

on:
  push:
    branches:
      - autoguard-v6-2-2-informe-master-patch
    paths:
      - "desktop/autoguard_scan_dios_v6_2/**"
      - ".github/workflows/build-autoguard-report-master-patch.yml"
  pull_request:
    branches:
      - main
    paths:
      - "desktop/autoguard_scan_dios_v6_2/**"
      - ".github/workflows/build-autoguard-report-master-patch.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-consolidated-patch:
    runs-on: windows-latest
    timeout-minutes: 85
    defaults:
      run:
        working-directory: desktop/autoguard_scan_dios_v6_2

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: desktop/autoguard_scan_dios_v6_2/requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pypdf

      - name: Generar base DTC con reintentos
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $ok = $false
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            Write-Host "Intento $attempt de generación de base DTC"
            python build_dtc_db.py
            if ($LASTEXITCODE -eq 0) {
              $ok = $true
              break
            }
            Start-Sleep -Seconds 10
          }
          if (-not $ok) { throw "No fue posible generar la base DTC después de tres intentos" }

      - name: Generar branding AUTO GUARD SERVICE
        run: python make_icon.py

      - name: Validar fuente consolidada
        run: python prepare_build.py

      - name: Validar sintaxis Python
        run: >-
          python -m compileall -q
          app.py final_launcher.py optimized_navigation_app.py navigation_premium_app.py
          god_premium_app.py premium_gauges.py final_dios_app.py final_widgets.py
          option_b_app.py premium_app.py deep_scan.py deep_scan_full.py
          diagnostic_parsers.py core.py dtc_database.py reporting.py
          validate_report_master.py tests/test_optimized_navigation.py

      - name: Ejecutar pruebas automáticas
        run: python -m pytest -q

      - name: Generar y validar PDF maestro
        run: python validate_report_master.py

      - name: Compilar aplicación actualizada
        run: pyinstaller --clean --noconfirm autoguard_scan.spec

      - name: Validar archivos compilados
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = Join-Path $PWD "dist\AUTOGUARD_SCAN_DIOS_v6.2\AUTOGUARD_SCAN_DIOS_v6.2.exe"
          $db = Join-Path $PWD "dist\AUTOGUARD_SCAN_DIOS_v6.2\_internal\data\autoguard_dtc.sqlite"
          if (!(Test-Path $exe)) { throw "No se generó el ejecutable" }
          if (!(Test-Path $db)) { throw "No se incorporó la base DTC" }

      - name: Autoprueba gráfica de menú y navegación
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = Join-Path $PWD "dist\AUTOGUARD_SCAN_DIOS_v6.2\AUTOGUARD_SCAN_DIOS_v6.2.exe"
          $working = Split-Path $exe
          $process = Start-Process -FilePath $exe -ArgumentList "--autoguard-self-test" -WorkingDirectory $working -PassThru -Wait
          if ($process.ExitCode -ne 0) {
            throw "La autoprueba de menú y navegación terminó con código $($process.ExitCode)"
          }
          Write-Host "Inicio directo en menú y navegación completa: correctos"

      - name: Prueba normal de apertura
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = Join-Path $PWD "dist\AUTOGUARD_SCAN_DIOS_v6.2\AUTOGUARD_SCAN_DIOS_v6.2.exe"
          $process = Start-Process -FilePath $exe -WorkingDirectory (Split-Path $exe) -PassThru
          Start-Sleep -Seconds 15
          if ($process.HasExited) {
            throw "La aplicación se cerró al iniciar. Código: $($process.ExitCode)"
          }
          Stop-Process -Id $process.Id -Force

      - name: Instalar Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Compilar parche consolidado
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { throw "No se encontró Inno Setup 6" }
          & $iscc "patch_installer.iss"
          if ($LASTEXITCODE -ne 0) {
            throw "La compilación del parche terminó con error $LASTEXITCODE"
          }
          $patch = "patch_output\AUTOGUARD_SCAN_DIOS_v6.2.6_PARCHE_CONSOLIDADO_Setup.exe"
          if (!(Test-Path $patch)) { throw "No se generó el parche consolidado" }

      - name: Preparar instalación anterior simulada
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installDir = Join-Path $env:LOCALAPPDATA "Autoguard\Fusion Scanner DIOS v6.2"
          $backupRoot = Join-Path $env:LOCALAPPDATA "Autoguard\Backups"
          if (Test-Path $installDir) { Remove-Item $installDir -Recurse -Force }
          if (Test-Path $backupRoot) { Remove-Item $backupRoot -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          Copy-Item "dist\AUTOGUARD_SCAN_DIOS_v6.2\*" $installDir -Recurse -Force
          "instalación anterior protegida" | Set-Content (Join-Path $installDir "ARCHIVO_ANTERIOR_PRUEBA.txt") -Encoding utf8
          New-Item -ItemType File -Path (Join-Path $installDir ".autoguard_ci_force_self_test_failure") -Force | Out-Null
          if (!(Test-Path (Join-Path $installDir "AUTOGUARD_SCAN_DIOS_v6.2.exe"))) {
            throw "No se pudo preparar la instalación anterior simulada"
          }

      - name: Ejecutar parche con fallo controlado
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installDir = Join-Path $env:LOCALAPPDATA "Autoguard\Fusion Scanner DIOS v6.2"
          $patch = Join-Path $PWD "patch_output\AUTOGUARD_SCAN_DIOS_v6.2.6_PARCHE_CONSOLIDADO_Setup.exe"
          $log = Join-Path $PWD "patch-rollback-test.log"
          $arguments = '/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR="' + $installDir + '" /LOG="' + $log + '"'
          $process = Start-Process -FilePath $patch -ArgumentList $arguments -PassThru -Wait
          "$($process.ExitCode)" | Set-Content "patch-rollback-exit-code.txt" -Encoding ascii
          if (Test-Path $log) { Get-Content $log | Select-Object -Last 100 }
          if ($process.ExitCode -ne 20) {
            throw "El parche debía informar rollback con código 20 y devolvió $($process.ExitCode)"
          }

      - name: Verificar restauración automática
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installDir = Join-Path $env:LOCALAPPDATA "Autoguard\Fusion Scanner DIOS v6.2"
          $sentinel = Join-Path $installDir "ARCHIVO_ANTERIOR_PRUEBA.txt"
          $forceMarker = Join-Path $installDir ".autoguard_ci_force_self_test_failure"
          if (!(Test-Path $sentinel)) { throw "El rollback no restauró el archivo anterior" }
          if ((Get-Content $sentinel -Raw).Trim() -ne "instalación anterior protegida") {
            throw "El rollback restauró contenido incorrecto"
          }
          if (!(Test-Path $forceMarker)) { throw "El rollback no restauró la capa completa" }
          $restorations = @(Get-ChildItem (Join-Path $env:LOCALAPPDATA "Autoguard\Backups") -Recurse -Filter "RESTAURACION_AUTOMATICA.txt" -ErrorAction SilentlyContinue)
          if ($restorations.Count -lt 1) { throw "No se registró la restauración automática" }
          Remove-Item $forceMarker -Force
          Write-Host "Versión anterior restaurada íntegramente"

      - name: Ejecutar parche funcional
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installDir = Join-Path $env:LOCALAPPDATA "Autoguard\Fusion Scanner DIOS v6.2"
          $patch = Join-Path $PWD "patch_output\AUTOGUARD_SCAN_DIOS_v6.2.6_PARCHE_CONSOLIDADO_Setup.exe"
          $log = Join-Path $PWD "patch-success-test.log"
          $arguments = '/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR="' + $installDir + '" /LOG="' + $log + '"'
          $process = Start-Process -FilePath $patch -ArgumentList $arguments -PassThru -Wait
          "$($process.ExitCode)" | Set-Content "patch-success-exit-code.txt" -Encoding ascii
          if (Test-Path $log) { Get-Content $log | Select-Object -Last 100 }
          if ($process.ExitCode -ne 0) {
            throw "La instalación funcional terminó con código $($process.ExitCode)"
          }

      - name: Validar instalación final y respaldo
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installDir = Join-Path $env:LOCALAPPDATA "Autoguard\Fusion Scanner DIOS v6.2"
          $exe = Join-Path $installDir "AUTOGUARD_SCAN_DIOS_v6.2.exe"
          $db = Join-Path $installDir "_internal\data\autoguard_dtc.sqlite"
          $sentinel = Join-Path $installDir "ARCHIVO_ANTERIOR_PRUEBA.txt"
          if (!(Test-Path $exe)) { throw "El parche no dejó el ejecutable" }
          if (!(Test-Path $db)) { throw "El parche no dejó la base DTC" }
          if (!(Test-Path $sentinel)) { throw "El parche eliminó un archivo ajeno" }

          $backupRoot = Join-Path $env:LOCALAPPDATA "Autoguard\Backups"
          $backups = @(Get-ChildItem $backupRoot -Directory -Filter "Consolidado_v6.2.6_*" -ErrorAction SilentlyContinue)
          if ($backups.Count -lt 2) { throw "Faltan respaldos de validación" }
          $latest = $backups | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (!(Test-Path (Join-Path $latest.FullName "RESPALDO_AUTOGUARD.txt"))) { throw "Falta manifiesto" }
          if (!(Test-Path (Join-Path $latest.FullName "Instalacion_anterior\ARCHIVO_ANTERIOR_PRUEBA.txt"))) { throw "Falta instalación anterior" }
          if (!(Test-Path (Join-Path $latest.FullName "PARCHE_APLICADO_CORRECTAMENTE.txt"))) { throw "Falta validación final" }

      - name: Autoprueba de la aplicación instalada
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installDir = Join-Path $env:LOCALAPPDATA "Autoguard\Fusion Scanner DIOS v6.2"
          $exe = Join-Path $installDir "AUTOGUARD_SCAN_DIOS_v6.2.exe"
          $process = Start-Process -FilePath $exe -ArgumentList "--autoguard-self-test" -WorkingDirectory $installDir -PassThru -Wait
          if ($process.ExitCode -ne 0) { throw "La aplicación instalada no superó la autoprueba final" }

      - name: Publicar diagnósticos del instalador
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AUTOGUARD_v6.2.6_PATCH_DIAGNOSTICS
          path: |
            desktop/autoguard_scan_dios_v6_2/patch-rollback-test.log
            desktop/autoguard_scan_dios_v6_2/patch-success-test.log
            desktop/autoguard_scan_dios_v6_2/patch-rollback-exit-code.txt
            desktop/autoguard_scan_dios_v6_2/patch-success-exit-code.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Crear paquete final y hashes
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "patch_release" | Out-Null
          $patch = "patch_output\AUTOGUARD_SCAN_DIOS_v6.2.6_PARCHE_CONSOLIDADO_Setup.exe"
          Copy-Item $patch "patch_release\AUTOGUARD_SCAN_DIOS_v6.2.6_PARCHE_CONSOLIDADO_Setup.exe" -Force
          Copy-Item "PATCH_NOTES_INFORME_MAESTRO.txt" "patch_release\LEEME_PARCHE_CONSOLIDADO.txt" -Force
          $hash = (Get-FileHash $patch -Algorithm SHA256).Hash.ToLower()
          "$hash  AUTOGUARD_SCAN_DIOS_v6.2.6_PARCHE_CONSOLIDADO_Setup.exe" | Set-Content "patch_release\SHA256.txt" -Encoding ascii
          @(
            "AUTOGUARD SCAN DIOS v6.2.6 - PARCHE CONSOLIDADO",
            "Autor: Esteban Cortez Richards",
            "Inicio directo en menú principal",
            "Navegación y gráficos optimizados",
            "Informe Maestro Premium con subinforme por DTC",
            "Base DTC, escaneo profundo, PID 015E y alternativa MAF",
            "Respaldo completo, autoprueba y rollback automático",
            "Build: $env:GITHUB_SHA"
          ) | Set-Content "patch_release\MANIFIESTO_PARCHE.txt" -Encoding utf8

      - name: Publicar parche consolidado
        uses: actions/upload-artifact@v4
        with:
          name: AUTOGUARD_SCAN_DIOS_v6.2.6_PARCHE_CONSOLIDADO_WINDOWS
          path: |
            desktop/autoguard_scan_dios_v6_2/patch_release/AUTOGUARD_SCAN_DIOS_v6.2.6_PARCHE_CONSOLIDADO_Setup.exe
            desktop/autoguard_scan_dios_v6_2/patch_release/SHA256.txt
            desktop/autoguard_scan_dios_v6_2/patch_release/LEEME_PARCHE_CONSOLIDADO.txt
            desktop/autoguard_scan_dios_v6_2/patch_release/MANIFIESTO_PARCHE.txt
          if-no-files-found: error
          retention-days: 30
