name: Transferir voz chilena AutoGuard

on:
  push:
    paths:
      - '.github/workflows/fetch-chilean-voice.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  transferir-voz:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar voz chilena
        run: |
          mkdir -p output
          curl --fail --location --retry 4 --retry-delay 3 \
            'https://resource2.heygen.ai/text_to_speech/30659c53516c4c6c8eb1082cd24c9615/3c8cb6e8914349f88993f4f9194efb8d/id=06e082d0-2ef6-4179-9e45-325ebb136827.wav' \
            --output output/voz-chilena-autoguard.wav
          test -s output/voz-chilena-autoguard.wav

      - name: Publicar voz chilena
        uses: actions/upload-artifact@v4
        with:
          name: voz-chilena-autoguard
          path: output/voz-chilena-autoguard.wav
          retention-days: 7

      - name: Finalizar transferencia
        run: exit 1
