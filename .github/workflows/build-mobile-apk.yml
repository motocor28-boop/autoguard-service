name: Build Autoguard Mobile APK

on:
  push:
    branches: ["autoguard-mobile-v1"]
  pull_request:
    paths:
      - "mobile-scanner/**"
      - ".github/workflows/build-mobile-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reconstruir proyecto Android
        run: |
          rm -rf mobile-scanner/project
          mkdir -p mobile-scanner/project
          cat mobile-scanner/chunks/part*.txt > /tmp/autoguard-mobile.b64
          base64 --decode /tmp/autoguard-mobile.b64 > /tmp/autoguard-mobile.zip
          unzip -q /tmp/autoguard-mobile.zip -d mobile-scanner/project
          test -f mobile-scanner/project/settings.gradle
          sed -i '/toolbar.inflateMenu(android.R.menu.empty);/d' mobile-scanner/project/app/src/main/java/com/autoguard/mobilescanner/MainActivity.java
          sed -i 's#@android:drawable/stat_sys_data_bluetooth#@android:drawable/ic_menu_share#g' mobile-scanner/project/app/src/main/res/menu/drawer_menu.xml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Compilar APK Android
        run: gradle -p mobile-scanner/project assembleDebug --stacktrace

      - name: Preparar APK con nombre Autoguard
        run: cp mobile-scanner/project/app/build/outputs/apk/debug/app-debug.apk Autoguard_Mobile_Scanner_v1.0.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Autoguard-Mobile-Scanner-v1.0-APK
          path: Autoguard_Mobile_Scanner_v1.0.apk
          if-no-files-found: error
