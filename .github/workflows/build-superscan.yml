name: Build SuperScan 2.0 Profesional R3

on:
  push:
    branches:
      - superscan-clean-build
  pull_request:
    branches:
      - superscan-clean-build
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -c "import numpy, matplotlib, reportlab; print('NumPy', numpy.__version__); print('Matplotlib', matplotlib.__version__)"

      - name: Validar sintaxis y módulos profesionales
        shell: pwsh
        run: |
          python -m compileall -q main.py superscan tests
          python -c "from superscan.professional_features import install_professional_features; from superscan.ui import SuperScanApp; install_professional_features(SuperScanApp); print('Interfaz profesional: OK')"

      - name: Ejecutar pruebas automáticas completas
        shell: pwsh
        run: python -m pytest -q

      - name: Compilar aplicación gráfica
        shell: pwsh
        run: python -m PyInstaller --noconfirm --clean superscan.spec

      - name: Probar ejecutable compilado, NumPy y bases offline
        shell: pwsh
        run: |
          $exe = 'dist\SuperScan 2.0\SuperScan 2.0.exe'
          if (-not (Test-Path $exe)) { throw "No se generó $exe" }
          $size = (Get-Item $exe).Length
          if ($size -lt 500000) { throw "Ejecutable demasiado pequeño: $size bytes" }
          $marker = Join-Path $PWD 'runtime_selftest_dist.txt'
          $env:SUPERSCAN_SELFTEST_MARKER = $marker
          $process = Start-Process -FilePath $exe -ArgumentList '--self-test' -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Autoprueba del ejecutable falló: $($process.ExitCode)" }
          if (-not (Test-Path $marker)) { throw "El ejecutable no creó la validación runtime" }
          $runtime = Get-Content $marker -Raw
          if ($runtime -notmatch 'OK' -or $runtime -notmatch 'DTC=12133' -or $runtime -notmatch 'Soluciones=12133') { throw "Resultado runtime inválido: $runtime" }
          "Producto: SuperScan 2.0 Profesional 2.1.0" | Out-File -FilePath VALIDACION_SUPERSCAN_PROFESIONAL_R3.txt -Encoding utf8
          "Ejecutable: $exe" | Out-File -FilePath VALIDACION_SUPERSCAN_PROFESIONAL_R3.txt -Encoding utf8 -Append
          "Tamaño ejecutable: $size bytes" | Out-File -FilePath VALIDACION_SUPERSCAN_PROFESIONAL_R3.txt -Encoding utf8 -Append
          "Runtime compilado: $runtime" | Out-File -FilePath VALIDACION_SUPERSCAN_PROFESIONAL_R3.txt -Encoding utf8 -Append
          "Pruebas: OBD-II, simulador, 12.133 DTC, 12.133 soluciones, informe PDF y gráficos completados" | Out-File -FilePath VALIDACION_SUPERSCAN_PROFESIONAL_R3.txt -Encoding utf8 -Append

      - name: Instalar Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Crear Setup.exe Profesional R3
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "No se encontró Inno Setup en $iscc" }
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup finalizó con código $LASTEXITCODE" }

      - name: Instalar silenciosamente y probar paquete instalado
        shell: pwsh
        run: |
          $setup = 'output\SuperScan 2.0 Profesional Setup R3.exe'
          if (-not (Test-Path $setup)) { throw "No se generó el instalador Profesional R3" }
          $install = Start-Process -FilePath $setup -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/SP-','/TASKS=""' -Wait -PassThru
          if ($install.ExitCode -ne 0) { throw "Instalación silenciosa falló: $($install.ExitCode)" }
          $installedExe = Join-Path $env:LOCALAPPDATA 'SuperScan\2.0 Final Mejorado\SuperScan 2.0.exe'
          if (-not (Test-Path $installedExe)) { throw "No se encontró el ejecutable instalado: $installedExe" }
          $marker = Join-Path $PWD 'runtime_selftest_installed.txt'
          $env:SUPERSCAN_SELFTEST_MARKER = $marker
          $process = Start-Process -FilePath $installedExe -ArgumentList '--self-test' -WorkingDirectory (Split-Path $installedExe) -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Autoprueba instalada falló: $($process.ExitCode)" }
          if (-not (Test-Path $marker)) { throw "La instalación no creó la validación runtime" }
          $runtime = Get-Content $marker -Raw
          if ($runtime -notmatch 'OK' -or $runtime -notmatch 'DTC=12133' -or $runtime -notmatch 'Soluciones=12133') { throw "Runtime instalado inválido: $runtime" }
          "Instalación limpia y ejecución instalada: OK" | Out-File -FilePath VALIDACION_SUPERSCAN_PROFESIONAL_R3.txt -Encoding utf8 -Append
          "Runtime instalado: $runtime" | Out-File -FilePath VALIDACION_SUPERSCAN_PROFESIONAL_R3.txt -Encoding utf8 -Append

      - name: Calcular SHA-256 y completar validación
        shell: pwsh
        run: |
          $setup = 'output\SuperScan 2.0 Profesional Setup R3.exe'
          $hash = (Get-FileHash $setup -Algorithm SHA256).Hash.ToLower()
          "$hash  SuperScan 2.0 Profesional Setup R3.exe" | Out-File -FilePath 'output\SuperScan 2.0 Profesional Setup R3.exe.sha256.txt' -Encoding ascii
          "Instalador: $setup" | Out-File -FilePath VALIDACION_SUPERSCAN_PROFESIONAL_R3.txt -Encoding utf8 -Append
          "SHA-256: $hash" | Out-File -FilePath VALIDACION_SUPERSCAN_PROFESIONAL_R3.txt -Encoding utf8 -Append
          Copy-Item VALIDACION_SUPERSCAN_PROFESIONAL_R3.txt output\VALIDACION_SUPERSCAN_PROFESIONAL_R3.txt

      - name: Publicar instalador Profesional R3
        uses: actions/upload-artifact@v4
        with:
          name: SuperScan-2.0-Profesional-R3-Windows
          path: |
            output/SuperScan 2.0 Profesional Setup R3.exe
            output/SuperScan 2.0 Profesional Setup R3.exe.sha256.txt
            output/VALIDACION_SUPERSCAN_PROFESIONAL_R3.txt
          if-no-files-found: error
          retention-days: 30
