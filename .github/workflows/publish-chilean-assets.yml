name: Publicar recursos voz chilena

on:
  push:
    paths:
      - '.github/workflows/publish-chilean-assets.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descargar video base y voz chilena
        run: |
          mkdir -p assets/video assets/audio
          curl --fail --location --retry 4 --retry-delay 3 \
            'https://walnut-prod-va6.walnut-cdn.adobe.io/walnut-compute-results/v2/0e96a7fc3768f4f67e07fa0a6dcb3329417f9bdf7a427648cf3d88a2691b2a04/result?x-auth=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3ODQyNDI4MDAsIm5iZiI6MTc4NDIzMjAwMCwia2V5VmVyc2lvbiI6MTc4MzAxMjIyMzEzNCwicGF0aCI6Ii93YWxudXQtY29tcHV0ZS1yZXN1bHRzL3YyLzBlOTZhN2ZjMzc2OGY0ZjY3ZTA3ZmEwYTZkY2IzMzI5NDE3ZjliZGY3YTQyNzY0OGNmM2Q4OGEyNjkxYjJhMDQvcmVzdWx0In0.pJbjf0HLGPZUFzttWaMz1V2loswRAQ5UudLvYjIipCA' \
            --output assets/video/reel-autoguard-base.mp4
          curl --fail --location --retry 4 --retry-delay 3 \
            'https://resource2.heygen.ai/text_to_speech/30659c53516c4c6c8eb1082cd24c9615/3c8cb6e8914349f88993f4f9194efb8d/id=06e082d0-2ef6-4179-9e45-325ebb136827.wav' \
            --output assets/audio/voz-chilena-autoguard.wav
          test -s assets/video/reel-autoguard-base.mp4
          test -s assets/audio/voz-chilena-autoguard.wav

      - name: Guardar recursos
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/video/reel-autoguard-base.mp4 assets/audio/voz-chilena-autoguard.wav
          git diff --cached --quiet || git commit -m 'Agregar recursos para versión con voz chilena'
          git push
