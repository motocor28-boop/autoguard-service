name: AutoGuard Voz Latina

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  generar-voz:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar generador de voz
        run: pip install --disable-pip-version-check edge-tts

      - name: Generar narración en español latino chileno
        shell: bash
        run: |
          cat > guion.txt <<'EOF'
          ¿Escuchas ruidos al frenar, sientes vibraciones o notas que el pedal responde distinto? No lo dejes pasar. En Auto Guard Service revisamos pastillas, discos, cálipers y líquido de frenos, y realizamos el cambio de pastillas directamente en tu domicilio. Trabajamos con seguridad, orden y transparencia, para que conozcas el estado real de tu vehículo. Atendemos en Antofagasta y alrededores. Agenda por WhatsApp al más cincuenta y seis, nueve, siete siete cuatro ocho, dos ocho dos uno. Auto Guard Service. Seguridad en cada frenada.
          EOF
          python -m edge_tts \
            --voice es-CL-LorenzoNeural \
            --rate=-4% \
            --pitch=-2Hz \
            --volume=+4% \
            --text "$(cat guion.txt)" \
            --write-media autoguard_voz_espanol_latino.mp3 \
            --write-subtitles autoguard_voz_espanol_latino.vtt
          ffmpeg -y -i autoguard_voz_espanol_latino.mp3 \
            -af "loudnorm=I=-16:TP=-1.5:LRA=11" \
            -ar 48000 -ac 2 autoguard_voz_espanol_latino.wav

      - name: Publicar audio
        uses: actions/upload-artifact@v4
        with:
          name: autoguard-voz-espanol-latino
          path: |
            autoguard_voz_espanol_latino.mp3
            autoguard_voz_espanol_latino.wav
            autoguard_voz_espanol_latino.vtt
            guion.txt
          retention-days: 7
