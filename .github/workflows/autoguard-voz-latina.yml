name: AutoGuard Video Final Latino

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  entregar-video:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Descargar video final con voz chilena
        shell: bash
        run: |
          curl -L --fail --retry 3 --output autoguard_video_espanol_latino.mp4 'https://walnut-prod-va6.walnut-cdn.adobe.io/walnut-compute-results/v2/9879825218ae2748f4f0b8060085ad1897e2f27460c0ede829d17440adaaa7f3/result?x-auth=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3ODQwMDUyMDAsIm5iZiI6MTc4Mzk5NDQwMCwia2V5VmVyc2lvbiI6MTc4MzAxMjIyMzEzNCwicGF0aCI6Ii93YWxudXQtY29tcHV0ZS1yZXN1bHRzL3YyLzk4Nzk4MjUyMThhZTI3NDhmNGYwYjgwNjAwODVhZDE4OTdlMmYyNzQ2MGMwZWRlODI5ZDE3NDQwYWRhYWE3ZjMvcmVzdWx0In0.TSJSN2xp3txt2R_N_e3-HaaxxGlRr_TYb7a9mgImO38'
          ffprobe -v error -show_entries format=duration,size -show_entries stream=codec_type,codec_name -of default=noprint_wrappers=1 autoguard_video_espanol_latino.mp4 > verificacion_video.txt

      - name: Publicar video final
        uses: actions/upload-artifact@v4
        with:
          name: autoguard-video-final-espanol-latino
          path: |
            autoguard_video_espanol_latino.mp4
            verificacion_video.txt
          retention-days: 30
